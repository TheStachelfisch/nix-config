# BTT SB2209 RP2040 Settings
[mcu EBBCan]
canbus_uuid: 4cf752eeb15f

[temperature_sensor sb2209]
sensor_type: Generic 3950
sensor_pin: EBBCan:gpio28

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
rotation_distance: 22.89882302
gear_ratio: 50:10 
microsteps: 32
full_steps_per_rotation: 200
max_extrude_only_distance: 1000.0
max_extrude_only_velocity: 50.0
max_extrude_only_accel: 1500
nozzle_diameter: 0.500
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type: PT1000
sensor_pin: EBBCan:gpio27
min_temp: 0
max_temp: 350
max_power: 1.0
min_extrude_temp: 160

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
interpolate: true
run_current: 0.650

# Part Cooling Fan
[fan]
pin: EBBCan:gpio14
max_power: 1.0
off_below: 0.15
kick_start_time: 0.5
cycle_time: 0.05

# Hotend Cooling Fan
[heater_fan hotend_fan]
pin: EBBCan:gpio13
max_power: 1.0
tachometer_pin: EBBCan:gpio12
heater: extruder
kick_start_time: 0.5
cycle_time: 0.05
off_below: 0.15
heater_temp: 50.0
fan_speed: 1

[neopixel toolhead_rgb]
pin: EBBCan:gpio16
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0
